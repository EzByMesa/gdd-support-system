services:
  # === PostgreSQL (опционально) ===
  # Раскомментируйте если нужна PostgreSQL вместо SQLite
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: gdd_support
  #     POSTGRES_USER: gdd
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gdd_password}
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U gdd"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

  # === Backend API ===
  backend:
    build: ./backend
    environment:
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      # PostgreSQL (раскомментируйте вместе с сервисом postgres):
      # DATABASE_URL: postgres://gdd:${POSTGRES_PASSWORD:-gdd_password}@postgres:5432/gdd_support
    volumes:
      - backend_data:/app/data
      - attachments:/app/attachments
    ports:
      - "3000:3000"
    restart: unless-stopped
    # depends_on:
    #   postgres:
    #     condition: service_healthy

  # === Frontend (Nginx) ===
  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
  attachments:
  # pgdata:
